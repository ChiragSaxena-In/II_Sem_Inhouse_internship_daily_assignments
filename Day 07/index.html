<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live User Directory</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  </head>
  <body class="bg-dark text-light">
    <div class="container py-4">
      <div
        class="d-flex justify-content-between align-items-center mb-4 flex-wrap"
      >
        <h1 class="text-info m-0">Live User Directory</h1>
        <span id="userCountBadge" class="badge bg-primary fs-6 mt-2 mt-md-0"
          >Showing 0 users</span
        >
      </div>
      <div class="row mb-4">
        <div class="col-md-8 mb-2 mb-md-0">
          <input
            type="text"
            id="searchInput"
            class="form-control bg-secondary text-white border-secondary"
            placeholder="Live search by name..."
          />
        </div>
        <div class="col-md-4 text-end">
          <button id="sortBtn" class="btn btn-outline-info w-100">
            Sort Alphabetically A-Z
          </button>
        </div>
      </div>
      <div id="user-container" class="row g-4"></div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
