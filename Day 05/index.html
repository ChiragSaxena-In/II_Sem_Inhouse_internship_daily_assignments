<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Cards</title>
    <link rel="stylesheet" href="style.css">

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

    <div class="container">

        <div class="card">
            <h2>John Doe</h2>
            <p>B.Tech CSE</p>

            <button class="btn-details">Show Details</button>

            <div class="details">
                <p><strong>Email:</strong> john@gmail.com</p>
                <p><strong>Phone:</strong> 9876543210</p>
                <p><strong>Department:</strong> Computer Science</p>
            </div>
        </div>

        <div class="card">
            <h2>Jane Smith</h2>
            <p>B.Tech IT</p>

            <button class="btn-details">Show Details</button>

            <div class="details">
                <p><strong>Email:</strong> jane@gmail.com</p>
                <p><strong>Phone:</strong> 9876543211</p>
                <p><strong>Department:</strong> Information Technology</p>
            </div>
        </div>

        <div class="card">
            <h2>Rahul Sharma</h2>
            <p>B.Tech Civil</p>

            <button class="btn-details">Show Details</button>

            <div class="details">
                <p><strong>Email:</strong> rahul@gmail.com</p>
                <p><strong>Phone:</strong> 9876543212</p>
                <p><strong>Department:</strong> Civil Engineering</p>
            </div>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
